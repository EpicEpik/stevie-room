<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Line Corridor</title>
<style>
  body { margin: 0; background: black; }
  canvas { display: block; margin: auto; background: #111; }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// draw corridor as lines
function drawCorridor() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "#00ffff";
  ctx.lineWidth = 2;

  // vertical “walls” converging to a vanishing point
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;

  for (let i = 0; i < 10; i++) {
    let offset = 40 + i * 20;
    ctx.beginPath();
    ctx.moveTo(centerX - offset, 0);
    ctx.lineTo(centerX - offset / 2, centerY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(centerX + offset, 0);
    ctx.lineTo(centerX + offset / 2, centerY);
    ctx.stroke();
  }

  // floor + ceiling lines
  ctx.strokeStyle = "#88aa55";
  for (let i = 0; i < 8; i++) {
    let y = centerY + i * 25;
    ctx.beginPath();
    ctx.moveTo(centerX - 200 + i * 10, y);
    ctx.lineTo(centerX + 200 - i * 10, y);
    ctx.stroke();

    let y2 = centerY - i * 25;
    ctx.beginPath();
    ctx.moveTo(centerX - 200 + i * 10, y2);
    ctx.lineTo(centerX + 200 - i * 10, y2);
    ctx.stroke();
  }
}

drawCorridor();
</script>

</body>
</html>
