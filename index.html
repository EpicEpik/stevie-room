<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stevie's Room</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 8px 10px;
      border-radius: 4px;
    }
    #message {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.7);
      padding: 6px 10px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="info">
  Click the bulb to toggle light.<br>
  Click toys to inspect them.
</div>
<div id="message"></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

let scene, camera, renderer, controls;
let raycaster, mouse;
let bulbMesh, bulbLight;
let toys = [];
let bulbOn = true;
const messageEl = document.getElementById('message');

init();
animate();

function showMessage(text) {
  messageEl.textContent = text;
  messageEl.style.opacity = '1';
  clearTimeout(showMessage._timer);
  showMessage._timer = setTimeout(() => {
    messageEl.style.opacity = '0';
  }, 1000);
}

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050509);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 4, 10);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 2, 0);
  controls.update();

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  const ambient = new THREE.AmbientLight(0x222233, 0.4);
  scene.add(ambient);

  const roomWidth = 10;
  const roomDepth = 10;
  const roomHeight = 5;

  const floorGeo = new THREE.PlaneGeometry(roomWidth, roomDepth);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0;
  scene.add(floor);

  const wallMat = new THREE.MeshStandardMaterial({ color: 0x303030, roughness: 0.9 });
  const roomGeo = new THREE.BoxGeometry(roomWidth, roomHeight, roomDepth);
  const room = new THREE.Mesh(roomGeo, wallMat);
  room.position.y = roomHeight / 2;
  room.material.side = THREE.BackSide;
  scene.add(room);

  const windowWidth = 3;
  const windowHeight = 2;
  const windowGeo = new THREE.PlaneGeometry(windowWidth, windowHeight);
  const windowMat = new THREE.MeshBasicMaterial({
    color: 0x99bbff,
    transparent: true,
    opacity: 0.6
  });
  const windowMesh = new THREE.Mesh(windowGeo, windowMat);
  windowMesh.position.set(0, 3, -roomDepth / 2 + 0.01);
  scene.add(windowMesh);

  const curtainGeo = new THREE.PlaneGeometry(windowWidth + 0.4, windowHeight + 0.6);
  const curtainMat = new THREE.MeshStandardMaterial({
    color: 0xdddddd,
    roughness: 1.0
  });
  const curtain = new THREE.Mesh(curtainGeo, curtainMat);
  curtain.position.set(0, 3, -roomDepth / 2 + 0.02);
  scene.add(curtain);

  const mattressGeo = new THREE.BoxGeometry(3, 0.4, 1.8);
  const mattressMat = new THREE.MeshStandardMaterial({
    color: 0xbba58a,
    roughness: 0.9
  });
  const mattress = new THREE.Mesh(mattressGeo, mattressMat);
  mattress.position.set(-roomWidth / 2 + 2, 0.2, 0);
  scene.add(mattress);

  const bulbGeo = new THREE.SphereGeometry(0.2, 16, 16);
  const bulbMat = new THREE.MeshStandardMaterial({
    color: 0xffffee,
    emissive: 0xffffaa,
    emissiveIntensity: 1.5,
    roughness: 0.3
  });
  bulbMesh = new THREE.Mesh(bulbGeo, bulbMat);
  bulbMesh.position.set(0, roomHeight - 0.5, 0);
  scene.add(bulbMesh);

  const wireGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.0, 8);
  const wireMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
  const wire = new THREE.Mesh(wireGeo, wireMat);
  wire.position.set(0, roomHeight - 1.0, 0);
  scene.add(wire);

  bulbLight = new THREE.PointLight(0xffffdd, 1.5, 20);
  bulbLight.position.copy(bulbMesh.position);
  scene.add(bulbLight);

  const toyMaterial = new THREE.MeshStandardMaterial({ color: 0x996633, roughness: 0.8 });
  const toyPositions = [
    new THREE.Vector3(roomWidth / 2 - 2, 0.3, 0),
    new THREE.Vector3(roomWidth / 2 - 1.5, 0.3, 1.5),
    new THREE.Vector3(roomWidth / 2 - 1.0, 0.3, -1.2)
  ];

  toyPositions.forEach((pos, index) => {
    const toy = createWoodenToy(toyMaterial);
    toy.position.copy(pos);
    toy.userData.type = 'toy';
    toy.userData.id = 'toy_' + index;
    scene.add(toy);
    toys.push(toy);
  });

  const doorWidth = 2;
  const doorHeight = 3;
  const doorGeo = new THREE.BoxGeometry(doorWidth, doorHeight, 0.2);
  const doorMat = new THREE.MeshStandardMaterial({ color: 0x553322, roughness: 0.8 });
  const door = new THREE.Mesh(doorGeo, doorMat);
  door.position.set(0, doorHeight / 2, roomDepth / 2 - 0.1);
  scene.add(door);

  window.addEventListener('resize', onWindowResize);
  renderer.domElement.addEventListener('pointerdown', onPointerDown);
}

function createWoodenToy(material) {
  const group = new THREE.Group();

  const bodyGeo = new THREE.BoxGeometry(0.4, 0.8, 0.2);
  const body = new THREE.Mesh(bodyGeo, material);
  body.position.y = 0.8;
  group.add(body);

  const headGeo = new THREE.SphereGeometry(0.2, 16, 16);
  const head = new THREE.Mesh(headGeo, material);
  head.position.y = 1.3;
  group.add(head);

  const armGeo = new THREE.BoxGeometry(0.6, 0.15, 0.15);
  const arms = new THREE.Mesh(armGeo, material);
  arms.position.y = 0.9;
  group.add(arms);

  const legGeo = new THREE.BoxGeometry(0.15, 0.6, 0.15);
  const leftLeg = new THREE.Mesh(legGeo, material);
  leftLeg.position.set(-0.12, 0.4, 0);
  const rightLeg = new THREE.Mesh(legGeo, material);
  rightLeg.position.set(0.12, 0.4, 0);
  group.add(leftLeg);
  group.add(rightLeg);

  return group;
}

function onPointerDown(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(scene.children, true);

  if (intersects.length > 0) {
    const obj = intersects[0].object;

    if (obj === bulbMesh) {
      toggleBulb();
      return;
    }

    let target = obj;
    while (target.parent && target.parent !== scene) {
      if (target.userData && target.userData.type === 'toy') break;
      target = target.parent;
    }

    if (target.userData && target.userData.type === 'toy') {
      inspectToy(target);
    }
  }
}

function toggleBulb() {
  bulbOn = !bulbOn;
  bulbLight.intensity = bulbOn ? 1.5 : 0.0;
  bulbMesh.material.emissiveIntensity = bulbOn ? 1.5 : 0.1;
  showMessage(bulbOn ? 'Bulb: ON' : 'Bulb: OFF');
}

function inspectToy(toy) {
  showMessage(`Toy inspected: ${toy.userData.id}`);
  const originalColor = toy.children[0].material.color.clone();
  toy.children.forEach(part => {
    part.material.color.set(0xffcc66);
  });
  setTimeout(() => {
    toy.children.forEach(part => {
      part.material.color.copy(originalColor);
    });
  }, 300);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
</script>
</body>
</html>
